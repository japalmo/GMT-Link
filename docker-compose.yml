# ─────────────────────────────────────────────────────────────────────────────
#  GMT Link — Docker Compose (entorno local de desarrollo)
#
#  Solo levanta la infraestructura (PostgreSQL + Redis).
#  El backend y el frontend los corres por separado con "npm run dev".
#
#  Comandos:
#    docker compose up -d        → levanta en segundo plano
#    docker compose down         → apaga y elimina contenedores
#    docker compose down -v      → apaga y borra también los datos
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: gmt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gmt_link
      POSTGRES_USER: gmt_admin
      POSTGRES_PASSWORD: gmt_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmt_admin -d gmt_link"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gmt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenFGA — servidor de autorización (§4.3). Almacenamiento in-memory (dev):
  # se resetea al reiniciar, por eso hay que correr `pnpm run fga:bootstrap`
  # (apps/api) después de levantarlo para recrear el store + authorization model.
  openfga:
    image: openfga/openfga:latest
    container_name: gmt_openfga
    restart: unless-stopped
    command: run
    ports:
      - "8080:8080" # HTTP API (FGA_API_URL)
      - "8081:8081" # gRPC

volumes:
  postgres_data:
  redis_data:
